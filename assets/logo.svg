<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Zer0 mark — QR finder eye that reads as a "0".
       Mono: inherits currentColor. -->
  <rect x="10" y="10" width="44" height="44" rx="14" stroke="currentColor" stroke-width="8"/>
  <rect x="24" y="24" width="16" height="16" rx="5" fill="currentColor"/>
</svg>
